<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickify - Your Notes</title>
    <link rel="stylesheet" href="styl.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="layout">
        <header>
            <img src="stickifylogo.png" alt="logo">
            <h1>Stickify - Twoje notatki</h1>
            <nav>
                <a href="https://www.instagram.com/Marcinuu662" target="_blank">
                    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram" width="32">
                </a>
                <a href="https://github.com/Marcinuu16" target="_blank">
                    <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub" width="32">
                </a>
            </nav>
        </header>

        <section id="section"></section>

        <aside>
            <button class="aside_buttons" id="new_note_button">
                <img src="add.png" alt="">Nowa notatka
            </button>

            <button class="aside_buttons" id="edit_note_button">
                <img src="edit.png" alt="">Edytuj notatki
            </button>

            <button class="aside_buttons" id="delete_note_button">
                <img src="delete.png" alt="">Usuń notatkę
            </button>

            <button class="aside_buttons" id="setting_button">
                <img src="setting.png" alt="">Ustawienia
            </button>
        </aside>

        <footer>© 2026 Marcin Burek — CC BY‑NC 4.0 | Non‑commercial use | All assets created by me
        </footer>
    </div>

    <div id="modal_overlay" class="hidden"></div>

    <div id="new_note_modal" class="modal hidden">
        Tytuł<input id="create_note_title" type="text" placeholder=""><br>
        Treść<input id="create_note_text" type="text" placeholder=""><br>
        Kolor 
        <select id="create_note_color">
            <option value="lightcoral" >🟥 | Czerwony</option>
            <option value="lightsalmon" >🟧 | Pomarańczowy</option>
            <option value="lightgoldenrodyellow" >🟨 | Żółty</option>
            <option value="lightgreen" >🟩 | Zielony</option>
            <option value="lightblue">🟦 | Niebieski</option>
            <option value="mediumpurple">🟪 | Fioletowy</option>
            <option value="lightgray">⬛ | Szary</option>
          </select>
        <button id="create_note_button">Utwórz notatkę</button>
        <button class="close_modal"><b>X</b></button>
    </div>

    <div id="edit_note_modal" class="modal hidden">
        <p>This is modal 2 Lore</p>
        <button class="close_modal"><b>X</b></button>
    </div>

    <div id="delete_note_modal" class="modal hidden">
        <p>Wybierz notatkę do usunięcia, najedz na notatkę i naciśnij lewy przycisk myszy.</p>
        <button class="close_modal"><b>X</b></button>
    </div>

    <div id="delete_note_confirm_modal" class="modal hidden">
        <p>Czy na pewno chcesz usunąć tą notatkę?</p>
        <button id="confirm_deletion">Utwórz notatkę</button>
        <button id="cancel_deletion">Utwórz notatkę</button>
        <button class="close_modal"><b>X</b></button>
    </div>

    <script src="script.js"></script>
</body>

</html>
