<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickify - Your Notes</title>
    <link rel="stylesheet" href="styl.css">

</head>

<body>

    <div class="layout">
        <header>
            <img src="stickifylogo.svg" alt="logo">
            <h1>Stickify - Twoje notatki</h1>
            <nav>
                <a href="https://www.instagram.com/Marcinuu662" target="_blank">
                    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram" width="32">
                </a>
                <a href="https://github.com/Marcinuu16" target="_blank">
                    <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub" width="32">
                </a>
                
            </nav>
        </header>

        <section id="section">

        </section>
        <aside>
            <button class="asideButtons" id="newNoteButton"><img src="add.png" alt="">Nowa notatka</button>
            <button class="asideButtons" id="editNoteButton"><img src="edit.png" alt="">Edytuj notatkę</button>
            <button class="asideButtons" id="deleteNoteButton"><img src="delete.png" alt="">Usuń notatkę</button>
            <button class="asideButtons" id="settingNoteButton"><img src="setting.png" alt="">Ustawienia
                notatek</button>
        </aside>
        <footer>© 2026 Marcin Burek | Licencja: CC BY-NC 4.0 | Źródła grafik: własne</footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
